name: countries_app
description: "A production-grade Flutter app showcasing countries from around the world with clean architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # State Management - BLoC/Cubit (Required)
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Dependency Injection (Bonus)
  get_it: ^8.0.2
  
  # HTTP Client (Required)
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0  # Bonus: Caching
  dio_cache_interceptor_hive_store: ^3.2.2
  
  # Data Models & Serialization (Bonus)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  
  # Local Storage (Required)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  
  # UI Utilities
  shimmer: ^3.0.0  # Loading states
  cached_network_image: ^3.4.1  # Image caching
  
  # Functional Programming
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation (Bonus)
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
